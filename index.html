<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 내신 문제제작기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1a1a1a;
    --ink-soft:#4a4a4a;
    --line:#d8d2c4;
    --line-strong:#b7ae99;
    --paper:#f7f4ec;
    --paper-card:#fffdf7;
    --accent:#7a2e2e;       /* deep oxblood */
    --accent-soft:#a8534f;
    --gold:#9c7b3a;
    --shadow:0 1px 2px rgba(40,30,15,.06),0 8px 24px rgba(40,30,15,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Noto Serif KR',serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ---------- App chrome ---------- */
  .app-header{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#fffdf7,#f7f4ec);
    position:sticky;top:0;z-index:50;
  }
  .app-header-inner{
    max-width:1080px;margin:0 auto;padding:18px 28px;
    display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
  }
  .brand{font-weight:900;font-size:22px;letter-spacing:-.01em;color:var(--accent)}
  .brand .en{font-size:12px;font-weight:500;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:2px}
  .crumbs{font-size:14px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .crumbs a{color:var(--accent-soft);text-decoration:none;cursor:pointer}
  .crumbs a:hover{text-decoration:underline}
  .crumbs .sep{color:var(--line-strong)}

  .wrap{max-width:1080px;margin:0 auto;padding:32px 28px 80px}

  /* ---------- Typographic bits ---------- */
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:6px}
  h1.page{font-size:30px;font-weight:700;margin:0 0 4px;letter-spacing:-.02em}
  .sub{color:var(--ink-soft);font-size:15px;margin-bottom:28px}

  /* ---------- Cards / grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{
    background:var(--paper-card);border:1px solid var(--line);border-radius:14px;
    padding:22px;box-shadow:var(--shadow);transition:transform .12s ease,box-shadow .12s ease,border-color .12s;
    position:relative;
  }
  .card.click{cursor:pointer}
  .card.click:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(40,30,15,.08),0 16px 36px rgba(40,30,15,.12);border-color:var(--line-strong)}
  .card h3{margin:0 0 6px;font-size:18px;font-weight:600}
  .card .meta{font-size:13px;color:var(--ink-soft)}
  .card .corner{position:absolute;top:14px;right:16px;font-size:12px;color:var(--line-strong);font-weight:600}
  .card-del{position:absolute;bottom:12px;right:14px;font-size:12px;color:var(--accent-soft);background:none;border:none;opacity:.6}
  .card-del:hover{opacity:1;text-decoration:underline}

  .add-card{
    border:1.5px dashed var(--line-strong);background:transparent;border-radius:14px;
    padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;color:var(--accent-soft);min-height:108px;font-size:15px;font-weight:500;transition:background .12s,border-color .12s;
  }
  .add-card:hover{background:#fffdf7;border-color:var(--accent-soft)}
  .add-card .plus{font-size:26px;line-height:1}

  /* ---------- Buttons ---------- */
  .btn{
    border:1px solid var(--accent);background:var(--accent);color:#fff;
    padding:11px 20px;border-radius:9px;font-size:14px;font-weight:600;letter-spacing:.01em;
    transition:filter .12s,transform .05s;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--accent);}
  .btn.ghost:hover{background:#fbf3f0}
  .btn.muted{background:#efe9da;border-color:var(--line-strong);color:var(--ink)}
  .btn.muted:hover{background:#e7dfca;filter:none}
  .btn.sm{padding:7px 13px;font-size:13px;border-radius:7px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}

  /* ---------- Forms ---------- */
  label.fld{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 6px}
  input.txt,textarea.txt,select.txt{
    width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:11px 13px;
    font-size:15px;background:var(--paper-card);color:var(--ink);
  }
  input.txt:focus,textarea.txt:focus,select.txt:focus{outline:2px solid var(--accent-soft);outline-offset:0;border-color:var(--accent-soft)}
  textarea.txt{resize:vertical;min-height:200px;line-height:1.65}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(30,22,12,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:48px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--paper-card);border-radius:16px;max-width:680px;width:100%;padding:28px;box-shadow:0 24px 60px rgba(20,12,4,.35);border:1px solid var(--line)}
  .modal h2{margin:0 0 4px;font-size:21px;font-weight:700}
  .modal .modal-sub{color:var(--ink-soft);font-size:14px;margin-bottom:20px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

  /* ---------- Passage list ---------- */
  .plist{display:flex;flex-direction:column;gap:12px}
  .prow{
    background:var(--paper-card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
    display:flex;gap:16px;align-items:flex-start;box-shadow:var(--shadow);
  }
  .prow.checkable{cursor:pointer}
  .pbadge{flex:none;min-width:42px;height:42px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;padding:0 8px}
  .pbody{flex:1;min-width:0}
  .pbody .ptitle{font-weight:600;font-size:15px;margin-bottom:3px}
  .pbody .pexcerpt{font-size:13px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .prow-actions{display:flex;gap:6px;flex:none}
  .chk{flex:none;width:22px;height:22px;border:2px solid var(--line-strong);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-top:10px;background:#fff}
  .chk.on{background:var(--accent);border-color:var(--accent);color:#fff}

  .empty{text-align:center;color:var(--ink-soft);padding:48px 20px;border:1.5px dashed var(--line);border-radius:14px}

  /* ---------- Builder ---------- */
  .builder-sel{display:flex;flex-direction:column;gap:18px}
  .type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .type-card{border:1px solid var(--line-strong);border-radius:12px;padding:16px;background:var(--paper-card);display:flex;flex-direction:column;gap:10px}
  .type-card.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(122,46,46,.15)}
  .type-card .th{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
  .type-card .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .type-card .cnt{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft)}
  .type-card .cnt input{width:64px;text-align:center}
  .switch{width:42px;height:24px;border-radius:14px;background:var(--line-strong);position:relative;transition:background .15s;flex:none}
  .switch.on{background:var(--accent)}
  .switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}
  .switch.on .knob{left:21px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hint-box{background:#fbf6ea;border:1px solid var(--gold);border-radius:10px;padding:14px 16px;font-size:13px;color:#5c4a1f;margin-bottom:20px}
  .hint-box code{background:#fff;border:1px solid var(--line-strong);border-radius:4px;padding:1px 6px;font-family:ui-monospace,monospace;font-size:12px}

  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:var(--paper-card);padding:8px 16px;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .seg button.on{background:var(--accent);color:#fff}

  @media(max-width:560px){
    .wrap{padding:24px 16px 60px}
    .app-header-inner{padding:14px 16px}
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-inner">
    <div class="brand"><span class="en">English Exam Builder</span>영어 내신 문제제작기</div>
    <div class="crumbs" id="crumbs"></div>
  </div>
</div>

<div class="wrap" id="view"></div>

<!-- generic modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CONFIG
========================================================= */
const SB_URL = "https://clattltzafzpchpcpwat.supabase.co";
const SB_KEY = "sb_publishable_BaMKZDiTcRJmaLgJ-jA-Xg_lKd8MruI";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const CIRCLED = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫'];

/* =========================================================
   STATE
========================================================= */
let state = { screen:'home', group:null };

/* =========================================================
   UTIL
========================================================= */
const $ = id => document.getElementById(id);
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(n){return Math.floor(Math.random()*n);}

// split body into sentences (keep terminal punctuation)
function splitSentences(text){
  let t=(text||'').replace(/\s+/g,' ').trim();
  if(!t) return [];
  // split after . ! ? possibly followed by quotes, when next char is space+capital/quote
  const parts = t.match(/[^.!?]+[.!?]+(?:["'”’)\]]+)?|\S[^.!?]*$/g) || [t];
  return parts.map(s=>s.trim()).filter(Boolean);
}
function words(sentence){return sentence.split(/\s+/).filter(Boolean);}

function closeModal(){$('overlay').classList.remove('show');$('modalBox').innerHTML='';}
$('overlay').addEventListener('click',e=>{if(e.target===$('overlay'))closeModal();});

/* render is defined across later script blocks */
</script>

<script>
/* =========================================================
   ROUTER / RENDER
========================================================= */
function render(){
  renderCrumbs();
  if(state.screen==='home') return renderHome();
  if(state.screen==='group') return renderGroup();
  if(state.screen==='builder') return renderBuilder();
}

function renderCrumbs(){
  const c=$('crumbs');
  if(state.screen==='home'){ c.innerHTML=''; return; }
  let h=`<a onclick="go('home')">홈</a>`;
  if(state.group){ h+=`<span class="sep">/</span><a onclick="go('group')">${esc(state.group.name)}</a>`; }
  if(state.screen==='builder'){ h+=`<span class="sep">/</span><span>문제 만들기</span>`; }
  c.innerHTML=h;
}

function go(screen){ state.screen=screen; render(); }

/* ---------------- HOME : groups ---------------- */
async function renderHome(){
  const v=$('view');
  v.innerHTML=`
    <div class="eyebrow">Groups</div>
    <h1 class="page">시험범위 그룹</h1>
    <div class="sub">교재·시험범위 단위로 본문을 모아두세요. 예: 2027 수능특강 영어</div>
    <div class="grid" id="groupGrid"><div class="empty">불러오는 중…</div></div>
  `;
  const {data,error}=await sb.from('groups').select('*, passages(count)').order('created_at',{ascending:true});
  const grid=$('groupGrid');
  if(error){grid.innerHTML=`<div class="empty">연결 오류: ${esc(error.message)}<br><br>Supabase에서 SQL 설정을 먼저 실행했는지 확인해주세요.</div>`;return;}
  let html='';
  (data||[]).forEach(g=>{
    const n = (g.passages&&g.passages[0]) ? g.passages[0].count : 0;
    html+=`
      <div class="card click" onclick="openGroup('${g.id}','${esc(g.name).replace(/'/g,"\\'")}')">
        <div class="corner">${n}개 본문</div>
        <h3>${esc(g.name)}</h3>
        <div class="meta">본문 관리 및 문제 제작</div>
        <button class="card-del" onclick="event.stopPropagation();delGroup('${g.id}','${esc(g.name).replace(/'/g,"\\'")}')">삭제</button>
      </div>`;
  });
  html+=`<button class="add-card" onclick="newGroupModal()"><span class="plus">+</span>그룹 추가</button>`;
  grid.innerHTML=html;
}

function newGroupModal(){
  $('modalBox').innerHTML=`
    <h2>새 그룹</h2>
    <div class="modal-sub">시험범위/교재 이름을 입력하세요.</div>
    <label class="fld">그룹 이름</label>
    <input class="txt" id="gname" placeholder="예: 2027 수능특강 영어" autocomplete="off">
    <div class="modal-actions">
      <button class="btn muted" onclick="closeModal()">취소</button>
      <button class="btn" id="gsave" onclick="saveGroup()">만들기</button>
    </div>`;
  $('overlay').classList.add('show');
  setTimeout(()=>$('gname').focus(),50);
  $('gname').addEventListener('keydown',e=>{if(e.key==='Enter')saveGroup();});
}
async function saveGroup(){
  const name=$('gname').value.trim();
  if(!name){toast('이름을 입력하세요');return;}
  const btn=$('gsave');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const {error}=await sb.from('groups').insert({name});
  if(error){toast('오류: '+error.message);btn.disabled=false;btn.textContent='만들기';return;}
  closeModal();render();
}
async function delGroup(id,name){
  if(!confirm(`"${name}" 그룹과 그 안의 모든 본문을 삭제할까요?`))return;
  const {error}=await sb.from('groups').delete().eq('id',id);
  if(error){toast('오류: '+error.message);return;}
  render();
}

function openGroup(id,name){ state.group={id,name}; state.screen='group'; render(); }
</script>

<script>
/* ---------------- GROUP : passages ---------------- */
async function renderGroup(){
  const v=$('view');
  v.innerHTML=`
    <div class="eyebrow">Passages</div>
    <h1 class="page">${esc(state.group.name)}</h1>
    <div class="sub">본문을 번호와 함께 저장하세요. 저장된 본문으로 문제를 만들 수 있습니다.</div>
    <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
      <button class="btn" onclick="newPassageModal()">+ 본문 추가</button>
      <button class="btn ghost" id="goBuild" onclick="go('builder')">문제 만들기 →</button>
    </div>
    <div class="plist" id="plist"><div class="empty">불러오는 중…</div></div>
  `;
  await loadPassages('plist',false);
}

async function loadPassages(targetId,checkable){
  const {data,error}=await sb.from('passages').select('*').eq('group_id',state.group.id).order('sort_order',{ascending:true}).order('created_at',{ascending:true});
  const box=$(targetId);if(!box)return;
  if(error){box.innerHTML=`<div class="empty">오류: ${esc(error.message)}</div>`;return [];}
  if(!data||!data.length){box.innerHTML=`<div class="empty">아직 본문이 없습니다. 위의 “+ 본문 추가”로 시작하세요.</div>`;return [];}
  state._passages=data;
  if(checkable){
    box.innerHTML=data.map(p=>`
      <div class="prow checkable" data-id="${p.id}" onclick="togglePick('${p.id}')">
        <div class="chk" id="chk_${p.id}"></div>
        <div class="pbadge">${esc(p.label)}</div>
        <div class="pbody"><div class="ptitle">${esc(p.label)}번 본문</div><div class="pexcerpt">${esc(p.body.slice(0,150))}</div></div>
      </div>`).join('');
  }else{
    box.innerHTML=data.map(p=>`
      <div class="prow">
        <div class="pbadge">${esc(p.label)}</div>
        <div class="pbody"><div class="ptitle">${esc(p.label)}번 본문 · ${splitSentences(p.body).length}문장</div><div class="pexcerpt">${esc(p.body.slice(0,160))}</div></div>
        <div class="prow-actions">
          <button class="btn sm muted" onclick="editPassageModal('${p.id}')">수정</button>
          <button class="btn sm ghost" onclick="delPassage('${p.id}')">삭제</button>
        </div>
      </div>`).join('');
  }
  return data;
}

function newPassageModal(){
  $('modalBox').innerHTML=passageForm('새 본문','','','psave',()=>savePassage());
  $('overlay').classList.add('show');
  setTimeout(()=>$('plabel').focus(),50);
}
function editPassageModal(id){
  const p=(state._passages||[]).find(x=>x.id===id);if(!p)return;
  $('modalBox').innerHTML=passageForm('본문 수정',p.label,p.body,'psave',()=>savePassage(id));
  $('overlay').classList.add('show');
}
function passageForm(title,label,body){
  return `
    <h2>${title}</h2>
    <div class="modal-sub">본문 번호와 영어 본문 텍스트를 입력하세요.</div>
    <label class="fld">번호 / 이름</label>
    <input class="txt" id="plabel" placeholder="예: 1  또는  23강 2번" value="${esc(label)}" autocomplete="off" style="margin-bottom:16px">
    <label class="fld">본문 텍스트</label>
    <textarea class="txt" id="pbody" placeholder="영어 본문을 그대로 붙여넣으세요.">${esc(body)}</textarea>
    <div class="modal-actions">
      <button class="btn muted" onclick="closeModal()">취소</button>
      <button class="btn" id="psave" onclick="window.__psave()">저장</button>
    </div>`;
}
async function savePassage(id){
  const label=$('plabel').value.trim();
  const body=$('pbody').value.trim();
  if(!label){toast('번호를 입력하세요');return;}
  if(!body){toast('본문을 입력하세요');return;}
  const btn=$('psave');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  let res;
  if(id){ res=await sb.from('passages').update({label,body}).eq('id',id); }
  else { res=await sb.from('passages').insert({group_id:state.group.id,label,body,sort_order:Date.now()%1e9}); }
  if(res.error){toast('오류: '+res.error.message);btn.disabled=false;btn.textContent='저장';return;}
  closeModal();render();
}
window.__psave=()=>{ /* rebound per modal */ };
// rebind helper: capture which id
function newPassageModal(){_pmodal('새 본문','','',null);}
function editPassageModal(id){const p=(state._passages||[]).find(x=>x.id===id);if(!p)return;_pmodal('본문 수정',p.label,p.body,id);}
function _pmodal(title,label,body,id){
  $('modalBox').innerHTML=passageForm(title,label,body);
  window.__psave=()=>savePassage(id);
  $('overlay').classList.add('show');
  setTimeout(()=>{const e=$('plabel');if(e)e.focus();},50);
}
async function delPassage(id){
  if(!confirm('이 본문을 삭제할까요?'))return;
  const {error}=await sb.from('passages').delete().eq('id',id);
  if(error){toast('오류: '+error.message);return;}
  render();
}
</script>

<script>
/* =========================================================
   QUESTION GENERATORS
   Each returns {qHtml, answer}
========================================================= */

// helper: split sentences into N near-equal contiguous chunks
function chunkSentences(sents,n){
  const total=sents.length;
  const out=[];let idx=0;
  for(let i=0;i<n;i++){
    const remainingChunks=n-i;
    const remainingSents=total-idx;
    const take=Math.ceil(remainingSents/remainingChunks);
    out.push(sents.slice(idx,idx+take));
    idx+=take;
  }
  return out;
}

/* ---- 1) 문장 삽입 (insertion) ----
   원문 문장들 사이 균등 간격 5곳에 ①~⑤ 마커.
   실제로는: 한 문장을 빼서 <보기>로 주고, 본문엔 그 자리 포함 5개 후보 위치를 표시…
   사용자 명세: 본문 문장 사이사이 특정 위치에 ①~⑤를 순서대로 넣고,
   선지는 ①~⑤. → 빠진 문장이 들어갈 위치를 고르는 표준 유형. */
function genInsertion(p){
  const sents=splitSentences(p.body);
  if(sents.length<6) return null;
  // choose a sentence to remove (not the first), prefer middle region
  const removableIdx = 1 + rand(sents.length-2); // 1..len-2
  const given = sents[removableIdx];
  const rest = sents.slice(0,removableIdx).concat(sents.slice(removableIdx+1));
  // candidate slots = gaps between rest sentences, excluding very first gap (맨 앞 제외), 균등 간격 5곳
  // gaps indices: after sentence i (0-based), i from 0..rest.length-1 ; slot before sentence => position
  // We need 5 slots evenly spaced, excluding the leading position (before first sentence).
  const positions=[]; // each = insert-after index in rest (0 means after 1st sentence)
  const n=rest.length;
  // available "after" positions: 0 .. n-1  (after each sentence). exclude none of these is "맨 앞";
  // "맨 앞" = before first sentence; we simply don't use it. choose 5 evenly across 0..n-1
  for(let k=0;k<5;k++){
    let pos=Math.round((k+1)*(n-1)/5);
    pos=Math.max(0,Math.min(n-1,pos));
    positions.push(pos);
  }
  // dedupe / ensure 5 distinct ascending
  let uniq=[...new Set(positions)].sort((a,b)=>a-b);
  let pp=0;
  while(uniq.length<5){ if(!uniq.includes(pp))uniq.push(pp); pp++; uniq=[...new Set(uniq)].sort((a,b)=>a-b);}
  uniq=uniq.slice(0,5).sort((a,b)=>a-b);
  // correct answer = the marker at the slot equal to removableIdx-ish.
  // The real correct gap is the position where 'given' originally sat = after sentence (removableIdx-1) in original,
  // which maps to "after" index (removableIdx-1) in rest only if removed idx>0. Map:
  const correctAfter = removableIdx-1; // insert AFTER this rest-index puts it back
  // ensure correctAfter is among slots; if not, replace nearest slot
  if(!uniq.includes(correctAfter)){
    // replace the closest slot with correctAfter
    let best=0,bd=1e9;
    uniq.forEach((s,i)=>{const d=Math.abs(s-correctAfter);if(d<bd){bd=d;best=i;}});
    uniq[best]=correctAfter;
    uniq=[...new Set(uniq)].sort((a,b)=>a-b);
    while(uniq.length<5){let q=0;while(uniq.includes(q))q++;uniq.push(q);uniq.sort((a,b)=>a-b);}
    uniq=uniq.slice(0,5).sort((a,b)=>a-b);
  }
  const answerMarkerIdx = uniq.indexOf(correctAfter);
  // build body with markers
  let parts=[];
  for(let i=0;i<n;i++){
    parts.push(esc(rest[i]));
    const slot=uniq.indexOf(i);
    if(slot>=0){ parts.push(`<span class="ins-mark">${CIRCLED[slot]}</span>`); }
  }
  const bodyHtml=parts.join(' ');
  const qHtml=`
    <div class="q-direction">다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?</div>
    <div class="q-given">${esc(given)}</div>
    <div class="q-passage">${bodyHtml}</div>
    <div class="q-choices inline">${CIRCLED.slice(0,5).map(c=>`<span class="choice">${c}</span>`).join('')}</div>`;
  return {qHtml, answer:CIRCLED[answerMarkerIdx]};
}

/* ---- 2) 순서배열 (paragraph order, 덩이 A/B/C) ----
   맨 앞 박스 1~2문장, 나머지를 3등분 (A)(B)(C), 섞어서 제시.
   선지 순서 고정: ①ACB ②BAC ③BCA ④CAB ⑤CBA */
const ORDER_CHOICES=[['A','C','B'],['B','A','C'],['B','C','A'],['C','A','B'],['C','B','A']];
function genOrder(p){
  const sents=splitSentences(p.body);
  if(sents.length<5) return null;
  const leadCount = sents.length>=8?2:1;
  const lead=sents.slice(0,leadCount).join(' ');
  const body=sents.slice(leadCount);
  const chunks=chunkSentences(body,3); // correct order chunks
  if(chunks.some(c=>c.length===0)) return null;
  const correct=['A','B','C']; // chunks[0]=A-correct etc. — but we must SHUFFLE labels
  // Assign the three chunks to labels A/B/C in a shuffled way, present in A,B,C order,
  // answer = sequence of original-chunk labels that reconstruct correct reading order.
  const labelOrder=shuffle(['A','B','C']); // labelOrder[i] = which correct-chunk gets shown as letter (A,B,C)
  // Build mapping: shownLetter -> chunk
  // We want: shown (A) (B) (C) each a chunk; correct reading order is chunks[0],chunks[1],chunks[2]
  // Let perm = which chunk index is placed under shown letter i
  const perm=shuffle([0,1,2]); // perm[0]=chunk index under (A)
  const shown={A:chunks[perm[0]],B:chunks[perm[1]],C:chunks[perm[2]]};
  // answer sequence = letters in order of correct chunks 0,1,2
  const letterOfChunk={};['A','B','C'].forEach((L,i)=>letterOfChunk[perm[i]]=L);
  const ansSeq=[letterOfChunk[0],letterOfChunk[1],letterOfChunk[2]]; // e.g. ['B','A','C']
  // find which choice number matches
  let ansNum=ORDER_CHOICES.findIndex(c=>c.join('')===ansSeq.join(''));
  // ORDER_CHOICES doesn't include 'ABC'. If correct seq is ABC, re-shuffle perm until not ABC.
  let guard=0;
  while(ansNum<0 && guard<50){
    const perm2=shuffle([0,1,2]);
    const lc={};['A','B','C'].forEach((L,i)=>lc[perm2[i]]=L);
    const seq2=[lc[0],lc[1],lc[2]];
    if(ORDER_CHOICES.findIndex(c=>c.join('')===seq2.join(''))>=0){
      shown.A=chunks[perm2[0]];shown.B=chunks[perm2[1]];shown.C=chunks[perm2[2]];
      ansSeq[0]=seq2[0];ansSeq[1]=seq2[1];ansSeq[2]=seq2[2];
      ansNum=ORDER_CHOICES.findIndex(c=>c.join('')===seq2.join(''));
    }
    guard++;
  }
  if(ansNum<0) return null;
  const qHtml=`
    <div class="q-direction">주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?</div>
    <div class="q-box">${esc(lead)}</div>
    <div class="q-seg"><span class="seg-label">(A)</span> ${esc(shown.A.join(' '))}</div>
    <div class="q-seg"><span class="seg-label">(B)</span> ${esc(shown.B.join(' '))}</div>
    <div class="q-seg"><span class="seg-label">(C)</span> ${esc(shown.C.join(' '))}</div>
    <div class="q-choices">${ORDER_CHOICES.map((c,i)=>`<span class="choice">${CIRCLED[i]} ${c.join('-')}</span>`).join('')}</div>`;
  return {qHtml, answer:`${CIRCLED[ansNum]} (${ansSeq.join('-')})`};
}

/* ---- 3) 순서배열 (문장 단위) ----
   첫 문장을 (A)로 박스 제시. 나머지 문장들을 알파벳(B,C,D…) 라벨 부여 후 섞어 제시.
   답안: (A)- 뒤에 올바른 알파벳 순서. */
function genOrderSentence(p){
  const sents=splitSentences(p.body);
  if(sents.length<4) return null;
  const first=sents[0];
  const rest=sents.slice(1);            // these are in CORRECT reading order
  // shuffle the sentences for DISPLAY, then label the displayed positions B,C,D,...
  const order=shuffle(rest.map((_,i)=>i)); // order[displayPos] = original index
  // avoid an already-in-order display
  let guard=0;
  while(order.join(',')===rest.map((_,i)=>i).join(',') && rest.length>1 && guard<20){
    const s=shuffle(rest.map((_,i)=>i));order.splice(0,order.length,...s);guard++;
  }
  const letters=[];for(let i=0;i<rest.length;i++)letters.push(String.fromCharCode(66+i)); // B,C,...
  // displayed item at position d shows letter[d] and sentence rest[order[d]]
  // build reverse map: original index -> displayed letter
  const letterOf={};order.forEach((origIdx,d)=>{letterOf[origIdx]=letters[d];});
  // answer = letters following correct reading order (original idx 0,1,2,...)
  const ansSeq=['A'];for(let i=0;i<rest.length;i++)ansSeq.push(letterOf[i]);
  const qHtml=`
    <div class="q-direction">주어진 글 (A)에 이어질 순서로 가장 적절한 것을 문장 단위로 배열하시오.</div>
    <div class="q-box"><span class="seg-label">(A)</span> ${esc(first)}</div>
    <div class="q-sentlist">
      ${order.map((origIdx,d)=>`<div class="q-seg"><span class="seg-label">(${letters[d]})</span> ${esc(rest[origIdx])}</div>`).join('')}
    </div>
    <div class="q-answerline"><span class="al-label">배열:</span> (A) - <span class="al-blank"></span></div>`;
  return {qHtml, answer:ansSeq.join(' - ')};
}

/* ---- 4) 서술형 문장배열 (word scramble, per sentence) ----
   본문 전체. 각 문장을 단어 단위로 / 로 구분해 섞고, 한 줄 답안칸 제공. */
function genWordScramble(p){
  const sents=splitSentences(p.body);
  if(!sents.length) return null;
  const rows=sents.map((s,i)=>{
    const w=words(s);
    const scrambled=w.length>1?shuffleEnsureChanged(w):w;
    return `
      <div class="ws-item">
        <div class="ws-scram">${i+1}. ${scrambled.map(esc).join(' / ')}</div>
        <div class="ws-line"></div>
      </div>`;
  }).join('');
  const ans=sents.map((s,i)=>`${i+1}. ${esc(s)}`).join('<br>');
  const qHtml=`
    <div class="q-direction">각 문장의 단어를 어법과 문맥에 맞게 바르게 배열하여 문장을 완성하시오.</div>
    <div class="ws-wrap">${rows}</div>`;
  return {qHtml, answer:ans};
}
function shuffleEnsureChanged(arr){
  if(arr.length<2)return arr;
  let s=shuffle(arr),g=0;
  while(s.join(' ')===arr.join(' ')&&g<20){s=shuffle(arr);g++;}
  return s;
}
</script>

<script>
/* =========================================================
   BUILDER UI
========================================================= */
const TYPES=[
  {key:'insertion', name:'문장 삽입', desc:'본문 사이 ①~⑤ 위치 중 주어진 문장이 들어갈 곳 고르기'},
  {key:'order', name:'순서배열', desc:'(A)(B)(C) 덩이 순서 맞히기 · 5지선다'},
  {key:'orderSent', name:'순서배열 (문장단위)', desc:'(A) 뒤 문장들을 알파벳으로 배열'},
  {key:'wordScramble', name:'서술형 문장배열', desc:'단어를 / 로 섞어 문장 재배열 (서술형)'},
];
let builderState={picked:new Set(), types:{}, counts:{}};

async function renderBuilder(){
  const v=$('view');
  builderState={picked:new Set(), types:{}, counts:{}};
  TYPES.forEach(t=>{builderState.types[t.key]=false;builderState.counts[t.key]=1;});
  v.innerHTML=`
    <div class="eyebrow">Build</div>
    <h1 class="page">문제 만들기</h1>
    <div class="sub">본문을 고르고, 유형과 번호당 문제 수를 정하세요.</div>

    <div class="builder-sel">
      <div>
        <label class="fld" style="font-size:15px;margin-bottom:10px">① 본문 선택</label>
        <div class="plist" id="pickList"><div class="empty">불러오는 중…</div></div>
      </div>

      <div>
        <label class="fld" style="font-size:15px;margin-bottom:10px">② 유형 · 번호당 문제 수</label>
        <div class="type-grid">
          ${TYPES.map(t=>`
            <div class="type-card" id="tc_${t.key}">
              <div class="th">
                <div class="switch" id="sw_${t.key}" onclick="toggleType('${t.key}')"><div class="knob"></div></div>
                ${t.name}
              </div>
              <div class="desc">${t.desc}</div>
              <div class="cnt">번호당 <input class="txt" type="number" min="1" max="10" value="1" id="cn_${t.key}" onchange="setCount('${t.key}',this.value)"> 문제</div>
            </div>`).join('')}
        </div>
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px">
        <button class="btn" id="genBtn" onclick="generate()">시험지 생성 →</button>
        <span class="sub" style="margin:0">서술형 배열은 자동으로 맨 마지막에 1단으로 배치됩니다.</span>
      </div>
    </div>
  `;
  await loadPassages('pickList',true);
}

function togglePick(id){
  if(builderState.picked.has(id))builderState.picked.delete(id);
  else builderState.picked.add(id);
  const c=$('chk_'+id);if(c)c.classList.toggle('on',builderState.picked.has(id));
  c.innerHTML=builderState.picked.has(id)?'✓':'';
}
function toggleType(key){
  builderState.types[key]=!builderState.types[key];
  $('sw_'+key).classList.toggle('on',builderState.types[key]);
  $('tc_'+key).classList.toggle('on',builderState.types[key]);
}
function setCount(key,v){builderState.counts[key]=Math.max(1,Math.min(10,parseInt(v)||1));}

const GEN_FN={insertion:genInsertion,order:genOrder,orderSent:genOrderSentence,wordScramble:genWordScramble};
// type order on paper: insertion, order, orderSent first (2-up), then wordScramble last (1-up)
const PAPER_ORDER=['insertion','order','orderSent','wordScramble'];

async function generate(){
  const picked=(state._passages||[]).filter(p=>builderState.picked.has(p.id));
  if(!picked.length){toast('본문을 선택하세요');return;}
  const activeTypes=PAPER_ORDER.filter(k=>builderState.types[k]);
  if(!activeTypes.length){toast('유형을 선택하세요');return;}

  const btn=$('genBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 생성 중…';
  // small delay so spinner shows
  await new Promise(r=>setTimeout(r,30));

  // Build question list.
  // For each type (in PAPER_ORDER), for each "round" 1..count, for each passage -> one question.
  // Order: type → round → passage  (1번 1차, 2번 1차, 1번 2차, 2번 2차 ...)
  const twoUp=[];   // {label, qHtml, answer}
  const oneUp=[];   // wordScramble
  let qno=0;
  const answers=[];

  for(const tkey of activeTypes){
    if(!builderState.types[tkey])continue;
    const count=builderState.counts[tkey];
    const fn=GEN_FN[tkey];
    const typeName=TYPES.find(t=>t.key===tkey).name;
    for(let round=0;round<count;round++){
      for(const p of picked){
        // attempt generation with retries
        let res=null,tries=0;
        while(!res&&tries<25){res=fn(p);tries++;}
        if(!res){continue;} // body too short for this type — skip silently
        qno++;
        const item={no:qno, typeName, label:p.label, qHtml:res.qHtml};
        answers.push({no:qno, typeName, label:p.label, answer:res.answer});
        if(tkey==='wordScramble')oneUp.push(item);else twoUp.push(item);
      }
    }
  }

  if(!qno){toast('선택한 본문이 너무 짧아 문제를 만들 수 없습니다');btn.disabled=false;btn.textContent='시험지 생성 →';return;}

  openPaper(twoUp,oneUp,answers);
  btn.disabled=false;btn.textContent='시험지 생성 →';
}
</script>
